<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Bounty Liquidity Guard decision matrix</title>
  <desc id="desc">Four evaluated bounty examples showing two rejected risk cases, one rejected low-value case, and one passing HBAR case.</desc>
  <rect width="960" height="540" fill="#f7f3ea"/>
  <rect x="50" y="48" width="860" height="58" fill="#111827"/>
  <text x="76" y="84" fill="#f7f3ea" font-family="Aptos, Segoe UI, sans-serif" font-size="25" font-weight="700">Decision packet matrix</text>
  <text x="626" y="84" fill="#d6f4de" font-family="Aptos, Segoe UI, sans-serif" font-size="16">liquidity + risk + expected value</text>
  <g font-family="Aptos, Segoe UI, sans-serif">
    <rect x="70" y="140" width="185" height="270" fill="#ffffff" stroke="#d6d0c2"/>
    <text x="92" y="176" fill="#111827" font-size="20" font-weight="700">MRWK</text>
    <text x="92" y="212" fill="#a23b3b" font-size="42" font-weight="800">REJECT</text>
    <text x="92" y="254" fill="#374151" font-size="15">Liquid value: $0</text>
    <text x="92" y="282" fill="#374151" font-size="15">No verified market</text>
    <rect x="92" y="328" width="126" height="24" fill="#f1d5d5"/>
    <text x="104" y="345" fill="#7a2424" font-size="13">internal token</text>
    <rect x="92" y="360" width="104" height="24" fill="#f1d5d5"/>
    <text x="104" y="377" fill="#7a2424" font-size="13">no off-ramp</text>

    <rect x="280" y="140" width="185" height="270" fill="#ffffff" stroke="#d6d0c2"/>
    <text x="302" y="176" fill="#111827" font-size="20" font-weight="700">OpenAgents</text>
    <text x="302" y="212" fill="#a23b3b" font-size="42" font-weight="800">REJECT</text>
    <text x="302" y="254" fill="#374151" font-size="15">Headline: $9000</text>
    <text x="302" y="282" fill="#374151" font-size="15">Prompt leak required</text>
    <rect x="302" y="328" width="128" height="24" fill="#f1d5d5"/>
    <text x="314" y="345" fill="#7a2424" font-size="13">research-only</text>
    <rect x="302" y="360" width="110" height="24" fill="#f1d5d5"/>
    <text x="314" y="377" fill="#7a2424" font-size="13">prompt leak</text>

    <rect x="490" y="140" width="185" height="270" fill="#ffffff" stroke="#d6d0c2"/>
    <text x="512" y="176" fill="#111827" font-size="20" font-weight="700">Tiny USDC</text>
    <text x="512" y="212" fill="#a23b3b" font-size="42" font-weight="800">REJECT</text>
    <text x="512" y="254" fill="#374151" font-size="15">Liquid value: $9</text>
    <text x="512" y="282" fill="#374151" font-size="15">Below hard gate</text>
    <rect x="512" y="328" width="110" height="24" fill="#f1d5d5"/>
    <text x="524" y="345" fill="#7a2424" font-size="13">under $10</text>

    <rect x="700" y="140" width="185" height="270" fill="#ffffff" stroke="#88b794"/>
    <text x="722" y="176" fill="#111827" font-size="20" font-weight="700">Hedera HBAR</text>
    <text x="722" y="212" fill="#177245" font-size="42" font-weight="800">PASS</text>
    <text x="722" y="254" fill="#374151" font-size="15">Liquid value: $750</text>
    <text x="722" y="282" fill="#374151" font-size="15">Expected: $81.25/hr</text>
    <rect x="722" y="328" width="104" height="24" fill="#d6f4de"/>
    <text x="734" y="345" fill="#14532d" font-size="13">major asset</text>
    <rect x="722" y="360" width="112" height="24" fill="#d6f4de"/>
    <text x="734" y="377" fill="#14532d" font-size="13">USDC market</text>
  </g>
  <line x1="70" y1="455" x2="885" y2="455" stroke="#111827" stroke-width="2"/>
  <text x="70" y="487" fill="#111827" font-family="Aptos, Segoe UI, sans-serif" font-size="15">The agent favors liquid dollars per hour, not headline payout.</text>
</svg>
